<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review – WDD 131 – Jeremías Davison</title>
  <meta name="description"
    content="Submit a product review. WDD 131 – Dynamic Web Fundamentals. Jeremías Davison.">
  <meta name="author" content="Jeremías Davison">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="styles/form.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap"
    rel="stylesheet">
  <script src="getdates.js" defer></script>
  <script src="scripts/form.js" defer></script>
</head>

<body>

  <header>
    <span id="course-title">WDD 131 – Dynamic Web Fundamentals</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="form.html" aria-current="page">Product Review</a>
    </nav>
  </header>

  <main>
    <div class="form-wrapper">
      <h1>Product Review</h1>

      <form method="get" action="review.html" novalidate>

        <!-- Product Name -->
        <div class="field-group">
          <label for="productName">Product Name <span class="required-mark" aria-hidden="true">*</span></label>
          <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
          </select>
        </div>

        <!-- Overall Rating -->
        <fieldset class="field-group">
          <legend>Overall Rating <span class="required-mark" aria-hidden="true">*</span></legend>
          <div class="rating-row">
            <div class="rating-option">
              <label for="rating1">&#9734;</label>
              <input type="radio" id="rating1" name="rating" value="1" required>
            </div>
            <div class="rating-option">
              <label for="rating2">&#9734;&#9734;</label>
              <input type="radio" id="rating2" name="rating" value="2" required>
            </div>
            <div class="rating-option">
              <label for="rating3">&#9734;&#9734;&#9734;</label>
              <input type="radio" id="rating3" name="rating" value="3" required>
            </div>
            <div class="rating-option">
              <label for="rating4">&#9734;&#9734;&#9734;&#9734;</label>
              <input type="radio" id="rating4" name="rating" value="4" required>
            </div>
            <div class="rating-option">
              <label for="rating5">&#9734;&#9734;&#9734;&#9734;&#9734;</label>
              <input type="radio" id="rating5" name="rating" value="5" required>
            </div>
          </div>
        </fieldset>

        <!-- Date of Installation -->
        <div class="field-group">
          <label for="installDate">Date of Installation <span class="required-mark" aria-hidden="true">*</span></label>
          <input type="date" id="installDate" name="installDate" required>
        </div>

        <!-- Useful Features -->
        <fieldset class="field-group">
          <legend>Which features did you find useful? <span class="optional-mark">(Check all that apply)</span></legend>
          <div class="checkbox-group">
            <label class="checkbox-label" for="durability">
              <input type="checkbox" id="durability" name="features" value="Durability">
              Durability
            </label>
            <label class="checkbox-label" for="easeOfUse">
              <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use">
              Ease of Use
            </label>
            <label class="checkbox-label" for="performance">
              <input type="checkbox" id="performance" name="features" value="Performance">
              Performance
            </label>
            <label class="checkbox-label" for="design">
              <input type="checkbox" id="design" name="features" value="Design">
              Design
            </label>
          </div>
        </fieldset>

        <!-- Written Review -->
        <div class="field-group">
          <label for="writtenReview">Written Review <span class="optional-mark">(Optional)</span></label>
          <textarea id="writtenReview" name="writtenReview" rows="5"
            placeholder="Share your experience with this product..."></textarea>
        </div>

        <!-- User Name -->
        <div class="field-group">
          <label for="userName">Your Name <span class="optional-mark">(Optional)</span></label>
          <input type="text" id="userName" name="userName" placeholder="Enter your name">
        </div>

        <input type="submit" value="Post Review">

      </form>
    </div>
  </main>

  <footer>
    <p>&#169;<span id="currentyear"></span> Jeremías Davison – Buenos Aires, Argentina</p>
    <p id="lastModified"></p>
  </footer>

</body>

</html>
