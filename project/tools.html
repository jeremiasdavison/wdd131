<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tools Directory – AI Pulse</title>
  <meta name="description" content="Explore the best AI tools for writing, coding, image generation, video, and more — curated by AI Pulse.">
  <meta name="author" content="Jeremías Davison">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">AI Pulse</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav>
        <ul id="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="tools.html" class="active">Tools</a></li>
          <li><a href="newsletter.html">Newsletter</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="section-header">
      <h2>AI Tools Directory</h2>
      <span id="tool-count"></span>
    </div>
    <p style="color: #9ca3af; margin-bottom: 1.5rem;">
      The best AI tools organized by category. Use the search or filter to find what you need.
    </p>

    <div class="search-bar">
      <input
        type="text"
        class="search-input"
        id="tool-search"
        placeholder="Search tools..."
      >
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="writing">Writing</button>
      <button class="filter-btn" data-category="coding">Coding</button>
      <button class="filter-btn" data-category="image">Image</button>
      <button class="filter-btn" data-category="video">Video</button>
      <button class="filter-btn" data-category="audio">Audio</button>
      <button class="filter-btn" data-category="search">Search</button>
    </div>

    <div class="tools-grid" id="tools-grid"></div>

    <div class="promo-banner">
      <img
        src="images/banner.svg"
        alt="Subscribe to the AI Pulse newsletter"
        width="900"
        height="80"
        loading="lazy"
      >
      <p><a href="newsletter.html">Missing a tool? Let us know &rarr;</a></p>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p>&copy; 2026 AI Pulse &ndash; Jeremías Davison &ndash; Buenos Aires, Argentina</p>
      <p><a href="references.html">References &amp; Sources</a></p>
    </div>
  </footer>

  <script src="scripts/tools.js"></script>

</body>

</html>
